<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Employee Information System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script>
        const setHtmlTheme = (theme) => document.documentElement.setAttribute('data-bs-theme', theme);
        const getSavedTheme = () => localStorage.getItem('theme') || 'dark';
        setHtmlTheme(getSavedTheme());
    </script>
</head>

<body class="d-flex align-items-center justify-content-center vh-100 position-relative">

    <div class="position-absolute top-0 end-0 p-4">
        <button id="themeToggle" class="theme-toggle-btn">☀️</button>
    </div>

    <div class="tech-card p-5 w-100" style="max-width: 400px;">
        <div class="text-center mb-4">
            <h1 class="brand-text fs-3 mb-2">Employee Portal</h1>
            <p class="text-secondary small">Please sign in to continue</p>
        </div>

        {% with messages = get_flashed_messages() %}
        {% if messages %}
        {% for message in messages %}
        <div class="alert alert-danger px-3 py-2 small" role="alert">
            {{ message }}
        </div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        <form action="{{ url_for('login') }}" method="POST">
            <div class="mb-3">
                <label for="username" class="form-label small fw-medium">Username</label>
                <input type="text" id="username" name="username" class="form-control bg-transparent" required
                    placeholder="Enter username">
            </div>
            <div class="mb-4">
                <label for="password" class="form-label small fw-medium">Password</label>
                <input type="password" id="password" name="password" class="form-control bg-transparent" required
                    placeholder="Enter password">
            </div>
            <button type="submit" class="btn btn-primary w-100 tech-btn">Sign In</button>
        </form>


        <script>
            document.addEventListener('DOMContentLoaded', () => {
                const toggleBtn = document.getElementById('themeToggle');
                if (toggleBtn) {
                    toggleBtn.innerHTML = getSavedTheme() === 'dark' ? '☀️' : '🌙';
                    toggleBtn.addEventListener('click', () => {
                        const newTheme = document.documentElement.getAttribute('data-bs-theme') === 'dark' ? 'light' : 'dark';
                        setHtmlTheme(newTheme);
                        localStorage.setItem('theme', newTheme);
                        toggleBtn.innerHTML = newTheme === 'dark' ? '☀️' : '🌙';
                    });
                }
            });
        </script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
